<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Штрихи — редактор</title>
<style>
:root{--bg:#f4f3ef;--card:#fff;--ink:#1c1917;--sub:#57534e;--muted:#a8a29e;--accent:#0d9488;--accent-soft:#d8f3ee;--accent-dark:#0f766e;--border:#e7e5e4;--contour:#d6d3d1;--fill:#f3f1ef;--bad:#dc2626;}
[data-theme="dark"]{--bg:#0c0a09;--card:#1c1917;--ink:#fafaf9;--sub:#a8a29e;--muted:#78716c;--accent:#14b8a6;--accent-soft:#10312b;--accent-dark:#5eead4;--border:#44403c;--contour:#57534e;--fill:#211e1b;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain;overflow-x:hidden;}
a{color:var(--accent-dark);text-decoration:none;}
.top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);}
.top h1{margin:0;font-size:1rem;}
.top p{margin:2px 0 0;font-size:.78rem;color:var(--sub);}
.layout{display:grid;grid-template-columns:minmax(260px,300px) 1fr;gap:12px;padding:12px;max-width:1100px;margin:0 auto;}
.side{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;}
.side h2{margin:0 0 8px;font-size:.82rem;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;}
.picks{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.pick{border:1px solid var(--border);background:var(--bg);color:var(--sub);border-radius:8px;padding:5px 9px;font:inherit;font-size:.78rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.pick.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.pick.has{border-color:var(--accent);color:var(--accent-dark);}
.pick:disabled{opacity:.35;cursor:default;}
.strokes{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow:auto;}
.st-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--border);border-radius:9px;background:var(--bg);cursor:pointer;font-size:.8rem;touch-action:manipulation;}
.st-item.active{border-color:var(--accent);background:var(--accent-soft);}
.st-item.pending{border-style:dashed;border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--bg));cursor:default;animation:pending-glow 1.4s ease-in-out infinite;}
@keyframes pending-glow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 35%,transparent)}}
.cue{fill:var(--accent);opacity:.9;animation:cue-pulse 1.1s ease-in-out infinite;}
@keyframes cue-pulse{0%,100%{r:6;opacity:.9}50%{r:11;opacity:.3}}
.next-badge{fill:var(--accent);opacity:.12;}
.next-badge-t{fill:var(--accent);font-size:28px;font-weight:800;font-family:Inter,system-ui,sans-serif;}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.st-meta{flex:1;color:var(--sub);}
.st-meta b{color:var(--ink);}
.hint{font-size:.74rem;color:var(--muted);margin-top:10px;line-height:1.45;}
.main{display:flex;flex-direction:column;gap:8px;}
.bar{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.bar .btn{border:1px solid var(--border);background:var(--bg);color:var(--sub);border-radius:9px;padding:8px 12px;font:inherit;font-size:.8rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.bar .btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.bar .btn:disabled{opacity:.38;cursor:default;}
.bar .btn-main{background:var(--accent);border-color:var(--accent);color:#fff;}
.bar .sep{width:1px;background:var(--border);margin:0 2px;}
.title{text-align:center;font-size:.84rem;font-weight:700;color:var(--sub);}
.stage{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;}
svg{display:block;width:100%;max-width:420px;margin:0 auto;height:auto;touch-action:none;border-radius:8px;background:repeating-linear-gradient(0deg,transparent,transparent 49.5%,#f0eeec 49.5%,#f0eeec 50.5%),repeating-linear-gradient(90deg,transparent,transparent 49.5%,#f0eeec 49.5%,#f0eeec 50.5%);-webkit-user-select:none;user-select:none;}
[data-theme="dark"] svg{background:repeating-linear-gradient(0deg,transparent,transparent 49.5%,#2a2724 49.5%,#2a2724 50.5%),repeating-linear-gradient(90deg,transparent,transparent 49.5%,#2a2724 49.5%,#2a2724 50.5%);}
.contour{fill:var(--fill);stroke:var(--contour);stroke-width:1.5;}
.status{min-height:1.1em;font-size:.78rem;color:var(--muted);padding:0 4px;}
.status.ok{color:var(--accent-dark);}
.status.err{color:var(--bad);}
.warn{padding:7px 9px;border-radius:8px;font-size:.76rem;color:var(--sub);background:color-mix(in srgb,var(--accent) 8%,var(--card));border:1px solid var(--border);margin-bottom:8px;}
@media(max-width:820px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>Направление штрихов</h1>
    <p>Контуры — <a href="writer-edit.html">writer-edit.html</a> · тренажёр — <a href="writer.html" target="_blank">writer.html</a></p>
  </div>
</header>

<div class="layout">
  <aside class="side">
    <h2>Буква</h2>
    <div class="picks" id="tabs"></div>
    <div class="picks" id="letters"></div>
    <div class="picks" id="forms"></div>
    <div class="warn" id="noPath" hidden>Нет контура — добавьте path в writer-data.js</div>

    <h2 style="margin-top:12px">Порядок</h2>
    <div class="strokes" id="strokeList"></div>
    <p class="hint">Рисуйте подряд: отпустили линию — сразу следующий штрих. Клик по готовому штриху — перерисовать его.<br><b>Ctrl+Z</b> отмена · <b>Esc</b> прервать линию</p>
  </aside>

  <section class="main">
    <div class="bar">
      <button class="btn" type="button" id="undoBtn" disabled>↶ Отменить</button>
      <button class="btn" type="button" id="redoBtn" disabled>↷ Вернуть</button>
      <span class="sep"></span>
      <button class="btn" type="button" id="upBtn" disabled>↑ Выше</button>
      <button class="btn" type="button" id="downBtn" disabled>↓ Ниже</button>
      <button class="btn" type="button" id="delBtn" disabled>🗑 Удалить</button>
      <span class="sep"></span>
      <button class="btn btn-main" type="button" id="playBtn">▶ Просмотр</button>
      <button class="btn" type="button" id="copyBtn">Копировать в файл</button>
    </div>
    <div class="status" id="status"></div>
    <div class="title" id="stageTitle">—</div>
    <div class="stage">
      <svg id="svg" viewBox="0 0 360 760" xmlns="http://www.w3.org/2000/svg">
        <path id="contour" class="contour"></path>
        <g id="strokes"></g>
        <g id="cue"></g>
        <g id="live"></g>
        <g id="anim"></g>
      </svg>
    </div>
  </section>
</div>

<script src="js/writer-data.js"></script>
<script src="js/writer-strokes-saved.js"></script>
<script>
const DATA = WRITER_DATA;
const COLORS = ['#0d9488','#dc2626','#2563eb','#9333ea','#ea580c','#db2777','#65a30d','#0891b2'];
const FORMS = [['initial','нач.'],['medial','сер.'],['final','кон.']];
const CATS = [...new Set(DATA.map(d => d.cat))];
const NS = 'http://www.w3.org/2000/svg';
const STORE_KEY = 'todo-writer-strokes-edit-v1';

let SAVED = loadSaved();
let curCat = CATS[0];
let curId = (DATA.find(d => d.cat === curCat) || DATA[0]).id;
let curForm = firstForm(curId);
let sel = null;
let drawing = false;
let pts = [];

const undoStack = [];
const redoStack = [];
const MAX_HIST = 60;

const $ = id => document.getElementById(id);
const svg = $('svg');
const gStrokes = $('strokes');
const gCue = $('cue');
const gLive = $('live');
const gAnim = $('anim');
const contour = $('contour');

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function loadSaved(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return deepClone(WRITER_STROKES_SAVED || {});
}
function persist(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(SAVED)); } catch (e) {}
}
function snapshot(){ return deepClone(SAVED); }
function pushHist(){
  undoStack.push(snapshot());
  if (undoStack.length > MAX_HIST) undoStack.shift();
  redoStack.length = 0;
  updateHistBtns();
  persist();
}
function undo(){
  if (drawing) { cancelDraw(); return; }
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  SAVED = undoStack.pop();
  sel = null;
  updateHistBtns();
  persist();
  rebuild();
  say('Отменено', 'ok');
}
function redo(){
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  SAVED = redoStack.pop();
  sel = null;
  updateHistBtns();
  persist();
  rebuild();
  say('Вернули', 'ok');
}
function updateHistBtns(){
  $('undoBtn').disabled = !undoStack.length && !drawing;
  $('redoBtn').disabled = !redoStack.length;
  const list = strokes();
  $('delBtn').disabled = sel == null;
  $('upBtn').disabled = sel == null || sel <= 1;
  $('downBtn').disabled = sel == null || sel >= list.length;
}

function glyph(){ return DATA.find(d => d.id === curId); }
function ensure(){
  const g = glyph();
  if (!SAVED[curId]) SAVED[curId] = { cy: g.cy, cat: g.cat, forms: {} };
  if (!SAVED[curId].forms[curForm]) SAVED[curId].forms[curForm] = { strokes: [] };
  return SAVED[curId].forms[curForm];
}
function strokes(){ return ensure().strokes.slice().sort((a, b) => a.order - b.order); }
function renumber(arr){ arr.forEach((s, i) => s.order = i + 1); }
function nextOrder(){ return strokes().length + 1; }
function drawOrder(){ return sel != null ? sel : nextOrder(); }
function isChain(){ return sel == null; }

function lastStrokeEnd(){
  const list = strokes();
  if (!list.length) return null;
  const dp = clean(list[list.length - 1].points);
  return dp.length ? dp[dp.length - 1] : null;
}

function say(msg, kind){
  const el = $('status');
  el.textContent = msg || '';
  el.className = 'status' + (kind ? ' ' + kind : '');
}

// --- geometry / draw helpers ---
const el = (t, a) => { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); return e; };
const clearG = g => { while (g.firstChild) g.removeChild(g.firstChild); };
const dist = (a, b) => Math.hypot(a[0] - b[0], a[1] - b[1]);
const pstr = p => p.map(q => q[0].toFixed(1) + ',' + q[1].toFixed(1)).join(' ');
function arrow(p1, p2){
  const a = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]), L = 14, W = 7;
  return p2[0] + ',' + p2[1] + ' ' +
    (p2[0] - L * Math.cos(a) + W * Math.sin(a)) + ',' + (p2[1] - L * Math.sin(a) - W * Math.cos(a)) + ' ' +
    (p2[0] - L * Math.cos(a) - W * Math.sin(a)) + ',' + (p2[1] - L * Math.sin(a) + W * Math.cos(a));
}
function clean(p){
  if (p.length < 2) return p.slice();
  const o = [p[0]];
  for (let i = 1; i < p.length; i++) if (dist(p[i], o[o.length - 1]) > 0.8) o.push(p[i]);
  return o.length > 1 ? o : p.slice();
}

function paintStroke(g, st, selected){
  const c = COLORS[(st.order - 1) % COLORS.length];
  const dp = clean(st.points);
  const wrap = document.createElementNS(NS, 'g');
  wrap.appendChild(el('polyline', {
    points: pstr(dp), fill: 'none', stroke: c,
    'stroke-width': selected ? 9 : 7, 'stroke-linecap': 'round', 'stroke-linejoin': 'round'
  }));
  if (dp.length > 1) wrap.appendChild(el('polygon', { points: arrow(dp[dp.length - 2], dp[dp.length - 1]), fill: c }));
  wrap.appendChild(el('circle', { cx: dp[0][0], cy: dp[0][1], r: selected ? 7 : 5, fill: c }));
  const t = el('text', { x: dp[0][0] - 3, y: dp[0][1] + 4, 'font-size': 9, fill: '#fff', 'font-weight': '700' });
  t.textContent = st.order;
  wrap.appendChild(t);
  wrap.style.cursor = 'pointer';
  wrap.addEventListener('click', e => { e.stopPropagation(); select(st.order); });
  g.appendChild(wrap);
}

function renderCanvas(){
  const g = glyph();
  const path = g && g.forms && g.forms[curForm];
  $('noPath').hidden = !!path;
  contour.setAttribute('d', path || '');
  const order = drawOrder();
  const formLbl = (FORMS.find(x => x[0] === curForm) || [, curForm])[1];
  $('stageTitle').textContent = (g ? g.cy : '?') + ' · ' + formLbl + (isChain() ? ' · штрих ' + order : ' · правка ' + order);
  clearG(gStrokes);
  clearG(gLive);
  clearG(gCue);
  strokes().forEach(st => paintStroke(gStrokes, st, st.order === sel));
  if (path && isChain() && !drawing) {
    const c = COLORS[(order - 1) % COLORS.length];
    const end = lastStrokeEnd();
    if (end) gCue.appendChild(el('circle', { class: 'cue', cx: end[0], cy: end[1], r: 7 }));
    const badge = el('circle', { class: 'next-badge', cx: 42, cy: 52, r: 26 });
    gCue.appendChild(badge);
    const t = el('text', { class: 'next-badge-t', x: 42, y: 62, 'text-anchor': 'middle' });
    t.textContent = order;
    gCue.appendChild(t);
  }
}

function renderList(){
  const host = $('strokeList');
  host.innerHTML = '';
  const list = strokes();
  list.forEach(st => {
    const row = document.createElement('div');
    row.className = 'st-item' + (st.order === sel ? ' active' : '');
    const c = COLORS[(st.order - 1) % COLORS.length];
    row.innerHTML = '<span class="dot" style="background:' + c + '"></span><span class="st-meta"><b>' + st.order + '</b> · ' + st.points.length + ' тч.</span>';
    row.onclick = () => select(st.order);
    host.appendChild(row);
  });
  if (glyph()?.forms?.[curForm] && isChain()) {
    const n = nextOrder();
    const row = document.createElement('div');
    row.className = 'st-item pending';
    const c = COLORS[(n - 1) % COLORS.length];
    row.innerHTML = '<span class="dot" style="background:' + c + '"></span><span class="st-meta"><b>' + n + '</b> · рисуйте сейчас</span>';
    host.appendChild(row);
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } else if (!list.length) {
    host.innerHTML = '<div class="hint">Проведите первый штрих по знаку</div>';
  }
}

function select(order){
  sel = order;
  renderList();
  renderCanvas();
  updateHistBtns();
  say('Штрих ' + order + ' — перерисуйте линию', 'ok');
}

function continueChain(wasOrder){
  sel = null;
  render();
  const n = nextOrder();
  say('Штрих ' + wasOrder + ' готов → рисуйте ' + n, 'ok');
}

function firstForm(id){
  for (const [f] of FORMS) {
    if ((SAVED[id]?.forms?.[f]?.strokes || []).length) return f;
  }
  const d = DATA.find(x => x.id === id);
  if (d?.forms) for (const [f] of FORMS) if (d.forms[f]) return f;
  return 'initial';
}

function strokeCount(id){
  let n = 0;
  const s = SAVED[id];
  if (!s?.forms) return 0;
  for (const f in s.forms) n += (s.forms[f].strokes || []).length;
  return n;
}

function buildTabs(){
  $('tabs').innerHTML = '';
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pick' + (cat === curCat ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => { curCat = cat; const f = DATA.find(d => d.cat === cat); if (f) { curId = f.id; curForm = firstForm(curId); } rebuild(); };
    $('tabs').appendChild(b);
  });
}
function buildLetters(){
  $('letters').innerHTML = '';
  DATA.filter(d => d.cat === curCat).forEach(d => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pick' + (d.id === curId ? ' active' : '');
    const n = strokeCount(d.id);
    b.textContent = d.cy + (n ? '·' + n : '');
    b.onclick = () => { curId = d.id; curForm = firstForm(curId); buildForms(); render(); };
    $('letters').appendChild(b);
  });
}
function buildForms(){
  $('forms').innerHTML = '';
  FORMS.forEach(([k, lbl]) => {
    const hasPath = !!(glyph()?.forms?.[k]);
    const n = (SAVED[curId]?.forms?.[k]?.strokes || []).length;
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pick' + (k === curForm ? ' active' : '') + (n ? ' has' : '');
    b.disabled = !hasPath;
    b.textContent = lbl + (n ? '(' + n + ')' : '');
    b.onclick = () => { curForm = k; sel = null; buildForms(); render(); };
    $('forms').appendChild(b);
  });
}

function render(){ renderCanvas(); renderList(); updateHistBtns(); }
function rebuild(){ buildTabs(); buildLetters(); buildForms(); render(); }

// --- draw ---
function sp(e){
  const r = svg.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return [(t.clientX - r.left) / r.width * 360, (t.clientY - r.top) / r.height * 760];
}
function cancelDraw(){
  drawing = false;
  pts = [];
  clearG(gLive);
  renderCanvas();
  updateHistBtns();
  say('Линия отменена — штрих ' + drawOrder(), 'ok');
}

svg.addEventListener('pointerdown', e => {
  if (!glyph()?.forms?.[curForm]) { say('Нет контура', 'err'); return; }
  e.preventDefault();
  stopAnim();
  drawing = true;
  pts = [sp(e)];
  clearG(gCue);
  updateHistBtns();
  const o = drawOrder();
  const c = COLORS[(o - 1) % COLORS.length];
  say('Штрих ' + o + '… (Esc — отмена)', 'ok');
});
svg.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  pts.push(sp(e));
  const o = drawOrder();
  const c = COLORS[(o - 1) % COLORS.length];
  clearG(gLive);
  gLive.appendChild(el('polyline', {
    points: pstr(pts), fill: 'none', stroke: c, 'stroke-width': 8,
    'stroke-linecap': 'round', 'stroke-linejoin': 'round', opacity: .9
  }));
});
function finishDraw(){
  if (!drawing) return;
  drawing = false;
  clearG(gLive);
  if (pts.length < 2) { say('Слишком коротко', 'err'); pts = []; renderCanvas(); updateHistBtns(); return; }
  pushHist();
  const entry = ensure();
  const points = pts.map(p => [Math.round(p[0] * 10) / 10, Math.round(p[1] * 10) / 10]);
  pts = [];
  let doneOrder;
  if (sel != null) {
    const st = entry.strokes.find(s => s.order === sel);
    if (st) st.points = points;
    doneOrder = sel;
    continueChain(doneOrder);
  } else {
    const order = nextOrder();
    entry.strokes.push({ order, points });
    doneOrder = order;
    continueChain(doneOrder);
  }
}
window.addEventListener('pointerup', finishDraw);

// --- edit actions ---
function deleteSel(){
  if (sel == null) return;
  pushHist();
  const entry = ensure();
  entry.strokes = entry.strokes.filter(s => s.order !== sel);
  renumber(entry.strokes);
  sel = null;
  render();
  say('Удалено', 'ok');
}
function moveSel(dir){
  if (sel == null) return;
  const arr = ensure().strokes.sort((a, b) => a.order - b.order);
  const i = arr.findIndex(s => s.order === sel);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= arr.length) return;
  pushHist();
  const tmp = arr[i].order;
  arr[i].order = arr[j].order;
  arr[j].order = tmp;
  renumber(arr);
  sel = arr[j].order;
  render();
  say('Порядок изменён', 'ok');
}

// --- preview ---
let animTok = 0, raf = null;
function stopAnim(){ animTok++; if (raf) cancelAnimationFrame(raf); raf = null; clearG(gAnim); }
function playAnim(){
  const list = strokes();
  if (!list.length) { say('Нет штрихов', 'err'); return; }
  stopAnim();
  const tok = ++animTok;
  let i = 0;
  function next(){
    if (i >= list.length) return;
    const st = list[i];
    const c = COLORS[(st.order - 1) % COLORS.length];
    const dp = clean(st.points);
    const node = el('polyline', { points: pstr(dp), fill: 'none', stroke: c, 'stroke-width': 7, 'stroke-linecap': 'round' });
    gAnim.appendChild(node);
    let L = 0;
    for (let k = 1; k < dp.length; k++) L += dist(dp[k - 1], dp[k]);
    node.style.strokeDasharray = L;
    node.style.strokeDashoffset = L;
    const t0 = performance.now(), dur = Math.max(350, L * 3.5);
    function step(now){
      if (tok !== animTok) return;
      const k = Math.min(1, (now - t0) / dur);
      node.style.strokeDashoffset = L * (1 - k);
      if (k < 1) raf = requestAnimationFrame(step);
      else { i++; setTimeout(() => { if (tok === animTok) next(); }, 150); }
    }
    raf = requestAnimationFrame(step);
  }
  next();
}

async function copyForFile(){
  const text = 'const WRITER_STROKES_SAVED = ' + JSON.stringify(SAVED, null, 2) + ';\n';
  try {
    await navigator.clipboard.writeText(text);
    say('Скопировано — вставьте в js/writer-strokes-saved.js', 'ok');
  } catch (e) {
    prompt('Скопируйте вручную:', text.slice(0, 500) + '…');
    say('Не удалось в буфер — используйте prompt', 'err');
  }
}

$('undoBtn').onclick = undo;
$('redoBtn').onclick = redo;
$('delBtn').onclick = deleteSel;
$('upBtn').onclick = () => moveSel(-1);
$('downBtn').onclick = () => moveSel(1);
$('playBtn').onclick = playAnim;
$('copyBtn').onclick = copyForFile;

document.addEventListener('keydown', e => {
  const tag = (document.activeElement?.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (e.key === 'Escape') cancelDraw();
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
  if (e.key === 'Delete' || e.key === 'Backspace') { if (sel != null) { e.preventDefault(); deleteSel(); } }
});

svg.addEventListener('click', e => {
  if (e.target === svg || e.target === contour) {
    sel = null;
    render();
    say('Цепочка · штрих ' + nextOrder(), 'ok');
  }
});

rebuild();
say('Штрих 1 — проведите линию', 'ok');
</script>
</body>
</html>
