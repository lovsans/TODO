<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <script>
        (function () {
            try {
                var s = null;
                try { s = localStorage.getItem('todo-theme'); } catch (e) {}
                var t = (s === 'dark' || s === 'light') ? s
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
                document.documentElement.style.colorScheme = t;
                var gc = null;
                try { gc = localStorage.getItem('todo-glyph-color'); } catch (e) {}
                if (!gc) {
                    try { if (localStorage.getItem('todo-glyph-accent') === '1') gc = 'teal'; } catch (e) {}
                }
                if (gc && gc !== 'default') document.documentElement.setAttribute('data-glyph-color', gc);
                else document.documentElement.removeAttribute('data-glyph-color');
                var fs = null;
                try { fs = localStorage.getItem('todo-font-scale'); } catch (e) {}
                var fn = parseFloat(fs);
                if (fn === 0.875 || fn === 1 || fn === 1.125 || fn === 1.25 || fn === 1.375 ||
                    fn === 1.55 || fn === 1.75 || fn === 2 || fn === 2.22) {
                    document.documentElement.style.setProperty('--ui-font-scale', String(fn));
                }
            } catch (e) {}
        })();
    </script>
    <title>Ойратский алфавит — Тодо Бичик</title>
    <meta name="description" content="Интерактивный атлас ойратского алфавита Тодо Бичик">
    <meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Тодо Бичик">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/icons/icon-192.png">
    <script src="js/font-data.js"></script>
    <script src="js/barintodo-data.js"></script>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Перейти к содержанию</a>
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="showSection('about'); return false;">
                <div class="logo-icon" id="logo-icon" aria-hidden="true">ᡐᡆᡑᡆ</div>
                <div class="logo-text">
                    <h1>Тодо Бичик</h1>
                    <span class="logo-sub">Интерактивный атлас ойратского алфавита</span>
                </div>
            </a>
            <div class="header-controls">
                <div class="font-scale-controls" role="group" aria-label="Размер шрифта">
                    <button type="button" class="theme-btn font-scale-btn" id="font-scale-down" onclick="bumpFontScale(-1)"
                            title="Уменьшить шрифт" aria-label="Уменьшить шрифт">
                        <span class="font-scale-icon font-scale-icon-sm" aria-hidden="true">A</span>
                    </button>
                    <button type="button" class="theme-btn font-scale-btn" id="font-scale-up" onclick="bumpFontScale(1)"
                            title="Увеличить шрифт" aria-label="Увеличить шрифт">
                        <span class="font-scale-icon font-scale-icon-lg" aria-hidden="true">A</span>
                    </button>
                </div>
                <div class="glyph-color-wrap" id="glyph-color-wrap">
                    <button type="button" class="theme-btn glyph-color-btn" id="glyph-color-btn"
                            aria-haspopup="true" aria-expanded="false" aria-controls="glyph-color-menu"
                            title="Цвет глифов" aria-label="Выбрать цвет знаков тодо">
                        <span class="glyph-heart" aria-hidden="true">♥</span>
                    </button>
                    <div class="glyph-color-menu" id="glyph-color-menu" role="menu" hidden aria-label="Цвет глифов">
                        <button type="button" class="glyph-swatch glyph-swatch-auto" data-color="default" role="menuitemradio" title="Как текст" aria-label="Цвет как у текста">А</button>
                        <button type="button" class="glyph-swatch" data-color="teal" role="menuitemradio" title="Бирюзовый" aria-label="Бирюзовый">♥</button>
                        <button type="button" class="glyph-swatch" data-color="blue" role="menuitemradio" title="Синий" aria-label="Синий">♥</button>
                        <button type="button" class="glyph-swatch" data-color="rose" role="menuitemradio" title="Розовый" aria-label="Розовый">♥</button>
                        <button type="button" class="glyph-swatch" data-color="amber" role="menuitemradio" title="Янтарный" aria-label="Янтарный">♥</button>
                        <button type="button" class="glyph-swatch" data-color="green" role="menuitemradio" title="Зелёный" aria-label="Зелёный">♥</button>
                        <button type="button" class="glyph-swatch" data-color="indigo" role="menuitemradio" title="Индиго" aria-label="Индиго">♥</button>
                        <button type="button" class="glyph-swatch" data-color="slate" role="menuitemradio" title="Серый" aria-label="Серый">♥</button>
                    </div>
                </div>
                <button type="button" class="theme-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Переключить тему" aria-label="Переключить тёмную тему">🌙</button>
            </div>
        </div>
    </header>

    <main class="container" id="main-content" tabindex="-1">
        <div class="search-bar" id="search-bar">
            <button type="button" class="search-toggle" id="search-toggle" onclick="toggleSearchBar()"
                    aria-expanded="false" aria-controls="search-panel" title="Поиск" aria-label="Открыть поиск">
                <span class="search-toggle-icon search-toggle-icon-open" aria-hidden="true">⌕</span>
                <span class="search-toggle-icon search-toggle-icon-close" aria-hidden="true">×</span>
            </button>
            <div class="search-panel" id="search-panel">
                <div class="search-input-wrap">
                    <span class="search-icon" aria-hidden="true">⌕</span>
                    <input id="search-input" type="search" inputmode="search" autocomplete="off"
                           placeholder="Буква, слово, правило или раздел… (Ctrl+K)"
                           aria-label="Поиск по сайту" aria-controls="search-results search-suggest"
                           title="Ctrl+K или / — открыть поиск · Esc — очистить">
                    <button id="search-clear" class="search-clear" onclick="clearSearch()" aria-label="Очистить" style="display:none">×</button>
                </div>
                <select id="search-filter" onchange="runSearch()" aria-label="Область поиска"></select>
            </div>
            <div id="search-suggest" class="search-suggest" hidden></div>
        </div>
        <nav class="nav-tabs" id="nav-tabs" aria-label="Разделы алфавита"></nav>
        <div id="search-results" class="search-results" style="display:none"></div>
        <div id="sections-container"></div>
    </main>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
            <button class="modal-back" id="modal-back" onclick="modalBack()" style="display:none" aria-label="Назад к предыдущей букве">← Назад</button>
            <button class="modal-close" onclick="closeModal()" aria-label="Закрыть">&times;</button>
            <h2 id="modal-title"></h2>
            <div class="modal-forms" id="modal-forms"></div>
            <dl class="modal-info" id="modal-info"></dl>
            <div class="modal-switch" id="modal-switch">
                <button class="modal-switch-btn" id="modal-prev" onclick="modalPrev()" aria-label="Предыдущая буква">← Пред.</button>
                <button class="modal-switch-btn" id="modal-next" onclick="modalNext()" aria-label="Следующая буква">След. →</button>
            </div>
            <p class="modal-swipe-hint" aria-hidden="true">Свайп, чтобы листать</p>
        </div>
    </div>


    <script src="js/data.js" defer></script>
    <script src="js/harmony-data.js" defer></script>
    <script src="js/reading-data.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/lessons.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/practice.js" defer></script>
    <script src="js/harmony.js" defer></script>
    <script src="js/path.js" defer></script>
    <script src="js/copybook.js" defer></script>
    <script src="js/writer.js" defer></script>
    <script src="js/main.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function (err) {
                    console.warn('SW register failed', err);
                });
            });
        }
    </script>
</body>
</html>
